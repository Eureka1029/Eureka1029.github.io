{{ define "main" }}
<main>
  <article class="search-page">
    <div class="title">
      <h1 class="title">{{ .Title }}</h1>
    </div>

    {{ with .Content }}
    <section class="body search-intro">
      {{ . }}
    </section>
    {{ end }}

    <section
      class="search-panel"
      data-search-root
      {{ with .OutputFormats.Get "json" }}data-search-index-url="{{ .RelPermalink }}"{{ end }}>
      <label class="search-label" for="search-query">查找文章</label>
      <input
        id="search-query"
        class="search-input"
        data-search-input
        type="search"
        name="q"
        autocomplete="off"
        spellcheck="false"
        aria-controls="search-results"
        aria-describedby="search-help search-status"
        placeholder="按标题、标签或内容搜索">
      <p id="search-help" class="search-hint">
        搜索已索引的内容。按 <kbd>/</kbd> 聚焦搜索框。
      </p>
      <p id="search-status" class="search-status" data-search-status aria-live="polite">
        正在加载搜索索引...
      </p>
      <ul id="search-results" class="search-results" data-search-results></ul>
    </section>

    <noscript>
      <p class="search-status search-status-error">搜索需要 JavaScript 支持。</p>
    </noscript>
  </article>
</main>
<script defer src="{{ absURL "js/search.js" }}"></script>
{{ end }}
